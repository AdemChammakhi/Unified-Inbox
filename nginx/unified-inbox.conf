# =============================================================================
# Unified Inbox — Host-level Nginx Config (Hostinger VPS)
# =============================================================================
# Install location: /etc/nginx/sites-available/unified-inbox.conf
# Then:  sudo ln -s /etc/nginx/sites-available/unified-inbox.conf /etc/nginx/sites-enabled/
#        sudo rm /etc/nginx/sites-enabled/default
#        sudo nginx -t && sudo systemctl reload nginx
#
# After Nginx is running, get TLS with Certbot:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# Replace "yourdomain.com" with your actual domain everywhere below.
# =============================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS (managed by Certbot — these paths are auto-filled) ──────────────
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── IP Whitelist (optional — uncomment to restrict access) ──────────────
    # Uncomment and add your office/home IPs to lock down the app.
    # Meta webhooks are excluded so they always work.
    #
    # allow 41.X.X.X;         # Office IP
    # allow 197.X.X.X;        # Home IP
    # deny all;

    # ── Webhooks — always allow (Meta must reach these) ─────────────────────
    location /api/webhooks/ {
        # allow all;   # Uncomment if using IP whitelist above
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    # ── Backend API ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    # ── Socket.IO — WebSocket upgrade ───────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Frontend — React SPA ────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
