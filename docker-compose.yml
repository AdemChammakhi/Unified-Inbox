networks:
  network1:
    external: true

services:
  # Backend - Express API
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: backend
    image: ademxd/projetpfe-backend:latest
    env_file:
      - .env
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # Real values come from .env — never commit secrets here
      # - MONGO_URI=<from .env>
      # - JWT_SECRET=<from .env>
    networks:
      - network1
    restart: unless-stopped

  # Frontend - React App served by Nginx
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: frontend
    image: ademxd/projetpfe-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - network1
    restart: unless-stopped
