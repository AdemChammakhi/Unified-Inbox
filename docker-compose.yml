networks:
  network1:
    external: true

services:
  # Backend - Express API
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb+srv://REDACTED:REDACTED@REDACTED
      - JWT_SECRET=REDACTED_JWT_SECRET
    networks:
      - network1
    restart: unless-stopped

  # Frontend - React App served by Nginx
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - network1
    restart: unless-stopped
