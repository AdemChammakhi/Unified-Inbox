apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unified-inbox-staging-ingress
  # No ingressClassName = uses the cluster default (Traefik on k3s)
  # No TLS, no ssl-redirect — plain HTTP for DAST scanning
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
