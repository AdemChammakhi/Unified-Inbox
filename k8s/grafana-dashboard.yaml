apiVersion: v1
kind: ConfigMap
metadata:
  name: unified-inbox-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1" # Grafana sidecar auto-imports any ConfigMap with this label
data:
  unified-inbox.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["unified-inbox", "application"],
      "time": { "from": "now-3h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Unified Inbox — Application Dashboard",
      "uid": "unified-inbox-v1",
      "version": 1,
      "templating": {
        "list": [
          {
            "current": { "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "label": "Datasource",
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": { "text": "production", "value": "production" },
            "hide": 0,
            "label": "Namespace",
            "name": "namespace",
            "options": [
              { "selected": true,  "text": "production", "value": "production" },
              { "selected": false, "text": "staging",    "value": "staging"    }
            ],
            "query": "production,staging",
            "type": "custom"
          }
        ]
      },
      "panels": [

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Status Overview",
          "type": "row"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "Number of backend pods currently in Running phase. Should equal 2 (your replica count).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "green",  "value": 2 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "count(kube_pod_status_phase{namespace=\"$namespace\",phase=\"Running\",pod=~\"backend.*\"}) or vector(0)",
              "instant": true,
              "legendFormat": "Running",
              "refId": "A"
            }
          ],
          "title": "Backend Pods Running",
          "type": "stat"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "Number of frontend (nginx) pods currently in Running phase.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "green",  "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "count(kube_pod_status_phase{namespace=\"$namespace\",phase=\"Running\",pod=~\"frontend.*\"}) or vector(0)",
              "instant": true,
              "legendFormat": "Running",
              "refId": "A"
            }
          ],
          "title": "Frontend Pods Running",
          "type": "stat"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "Total container restarts in the last hour across all pods. Green=0, Yellow=1-4, Red≥5 signals a crash-loop.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red",    "value": 5 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "ceil(sum(increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\"}[1h])) or vector(0))",
              "instant": true,
              "legendFormat": "Restarts",
              "refId": "A"
            }
          ],
          "title": "Pod Restarts (Last 1h)",
          "type": "stat"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "Free RAM on the Azure VM node as a percentage. Below 20% risks OOM kills of your pods.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 20 },
                  { "color": "green",  "value": 40 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "id": 5,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "100 * node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes",
              "instant": true,
              "legendFormat": "Available %",
              "refId": "A"
            }
          ],
          "title": "Node Memory Available",
          "type": "gauge"
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 10,
          "title": "CPU & Memory",
          "type": "row"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "CPU cores used by backend and frontend containers. Your backend limit is 500m (0.5 core) — alerts if you are approaching it.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 11,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "100 * sum(rate(container_cpu_usage_seconds_total{namespace=\"$namespace\",container=\"backend\"}[5m]))",
              "legendFormat": "Backend",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "100 * sum(rate(container_cpu_usage_seconds_total{namespace=\"$namespace\",container=\"frontend\"}[5m]))",
              "legendFormat": "Frontend",
              "refId": "B"
            }
          ],
          "title": "Container CPU Usage (%)",
          "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "Working-set memory in MB. Your backend limit is 512 MB — a value approaching that means you may get OOM-killed.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "decmbytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 12,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "sum(container_memory_working_set_bytes{namespace=\"$namespace\",container=\"backend\"}) / 1024 / 1024",
              "legendFormat": "Backend MB",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "sum(container_memory_working_set_bytes{namespace=\"$namespace\",container=\"frontend\"}) / 1024 / 1024",
              "legendFormat": "Frontend MB",
              "refId": "B"
            }
          ],
          "title": "Container Memory Usage (MB)",
          "type": "timeseries"
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 20,
          "title": "Network Traffic — Webhook & API Activity",
          "type": "row"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "Bytes/sec received by backend pods. Every Facebook/Instagram webhook event and every client API call shows up here as a spike. Use this to correlate message bursts with load.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 21,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"$namespace\",pod=~\"backend.*\"}[5m]))",
              "legendFormat": "Inbound (Webhooks + Requests)",
              "refId": "A"
            }
          ],
          "title": "Backend Inbound Traffic",
          "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "Bytes/sec sent by backend pods. Includes API responses to the React client, Graph API name-lookup calls, and Messenger Send API calls.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 22,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"$namespace\",pod=~\"backend.*\"}[5m]))",
              "legendFormat": "Outbound (Responses + Graph API)",
              "refId": "A"
            }
          ],
          "title": "Backend Outbound Traffic",
          "type": "timeseries"
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 30,
          "title": "Autoscaling & Stability",
          "type": "row"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "HPA current / desired / max replicas over time. If current < desired for more than a minute, the cluster cannot scale fast enough — investigate resource limits.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 0,
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "showPoints": "always",
                "pointSize": 6,
                "spanNulls": false
              },
              "decimals": 0,
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "id": 31,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"$namespace\"}",
              "legendFormat": "Current — {{horizontalpodautoscaler}}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"$namespace\"}",
              "legendFormat": "Desired — {{horizontalpodautoscaler}}",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"$namespace\"}",
              "legendFormat": "Max — {{horizontalpodautoscaler}}",
              "refId": "C"
            }
          ],
          "title": "HPA Replicas (Current / Desired / Max)",
          "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "Container restart rate per 5-minute window. Any bar above zero means a container crashed. Stacked bars identify which container is crashing.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "id": 32,
          "options": {
            "legend": { "calcs": ["sum"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "rate(kube_pod_container_status_restarts_total{namespace=\"$namespace\"}[5m]) * 300",
              "legendFormat": "{{container}}",
              "refId": "A"
            }
          ],
          "title": "Pod Restart Rate",
          "type": "timeseries"
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 },
          "id": 40,
          "title": "Node Resources (Azure VM)",
          "type": "row"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "Node-level CPU % used. Your backend and frontend containers run here — sustained >85% will throttle them.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": false,
                "thresholdsStyle": { "mode": "line+area" }
              },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "transparent", "value": null },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 33 },
          "id": 41,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU Used %",
              "refId": "A"
            }
          ],
          "title": "Node CPU Usage",
          "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "description": "Root filesystem usage on the Azure VM. Container images, MongoDB data, and logs all count toward this. Keep below 80% to avoid pod evictions.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": false,
                "thresholdsStyle": { "mode": "line+area" }
              },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "transparent", "value": null },
                  { "color": "red", "value": 80 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 33 },
          "id": 42,
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "100 - (100 * node_filesystem_avail_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"})",
              "legendFormat": "Disk Used %",
              "refId": "A"
            }
          ],
          "title": "Node Disk Usage (Root Filesystem)",
          "type": "timeseries"
        }

      ]
    }
