# Ingress with TLS termination
# Uses Traefik (k3s default ingress controller) + cert-manager for Let's Encrypt
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unified-inbox-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # WebSocket support for Socket.IO
    traefik.ingress.kubernetes.io/router.middlewares: default-websocket@kubernetescrd
    # cert-manager auto-TLS via Let's Encrypt
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - unified-inbox.duckdns.org
      secretName: unified-inbox-tls
  rules:
    - host: unified-inbox.duckdns.org
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
